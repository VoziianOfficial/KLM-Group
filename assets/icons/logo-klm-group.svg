<svg width="430" height="128" viewBox="0 0 430 128" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="klmLogoTitle klmLogoDesc">
  <title id="klmLogoTitle">KLM Group Logo</title>
  <desc id="klmLogoDesc">KLM Group digital marketing logo with performance lens and growth analytics symbol.</desc>

  <defs>
    <linearGradient id="klmBladeA" x1="18" y1="108" x2="110" y2="18" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#183F15"/>
      <stop offset="0.38" stop-color="#4FAF24"/>
      <stop offset="0.72" stop-color="#A8FF3E"/>
      <stop offset="1" stop-color="#E3FF72"/>
    </linearGradient>

    <linearGradient id="klmBladeB" x1="108" y1="16" x2="18" y2="112" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F1FFB8"/>
      <stop offset="0.34" stop-color="#A8FF3E"/>
      <stop offset="0.72" stop-color="#2E7D1F"/>
      <stop offset="1" stop-color="#0B2412"/>
    </linearGradient>

    <linearGradient id="klmCore" x1="46" y1="46" x2="82" y2="86" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1B2319"/>
      <stop offset="0.52" stop-color="#080908"/>
      <stop offset="1" stop-color="#020302"/>
    </linearGradient>

    <radialGradient id="klmGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(64 64) rotate(90) scale(46)">
      <stop offset="0" stop-color="#A8FF3E" stop-opacity="0.26"/>
      <stop offset="0.48" stop-color="#A8FF3E" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#A8FF3E" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="klmShine" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(79 28) rotate(130) scale(32 22)">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.45"/>
      <stop offset="0.42" stop-color="#FFFFFF" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <filter id="klmShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="5" flood-color="#000000" flood-opacity="0.28"/>
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#A8FF3E" flood-opacity="0.07"/>
    </filter>
  </defs>

  <!-- Symbol: performance lens + marketing growth core -->
  <g filter="url(#klmShadow)">
    <circle cx="64" cy="64" r="50" fill="url(#klmGlow)"/>

    <!-- clean realistic blades -->
    <path d="M64 10C78 10 92 15 103 24C87 23 73 27 61 35C54 24 45 17 33 13C43 11 53 10 64 10Z" fill="url(#klmBladeB)"/>
    <path d="M103 24C114 34 120 48 120 63C110 51 97 43 82 39C84 27 81 17 75 8C86 11 96 16 103 24Z" fill="url(#klmBladeA)"/>
    <path d="M120 63C120 78 114 92 103 103C101 87 95 74 84 63C94 55 101 44 103 31C113 40 119 51 120 63Z" fill="url(#klmBladeB)"/>
    <path d="M103 103C92 113 78 118 63 118C75 108 82 95 84 80C97 77 107 70 114 59C114 77 110 92 103 103Z" fill="url(#klmBladeA)"/>
    <path d="M63 118C48 118 34 112 24 102C39 104 53 100 65 92C73 103 83 110 95 114C85 118 74 119 63 118Z" fill="url(#klmBladeB)"/>
    <path d="M24 102C14 91 9 77 10 62C20 74 33 82 48 86C46 99 49 110 56 119C42 116 31 110 24 102Z" fill="url(#klmBladeA)"/>
    <path d="M10 62C11 47 17 33 28 23C30 38 36 51 46 62C36 70 29 81 26 94C16 84 10 73 10 62Z" fill="url(#klmBladeB)"/>
    <path d="M28 23C39 14 53 9 68 10C56 20 49 33 46 48C33 51 22 58 15 69C15 50 19 35 28 23Z" fill="url(#klmBladeA)"/>

    <!-- realistic dark core -->
    <circle cx="64" cy="64" r="23" fill="url(#klmCore)"/>
    <circle cx="64" cy="64" r="23" stroke="#A8FF3E" stroke-opacity="0.16" stroke-width="1.4"/>

    <!-- marketing analytics bars inside core -->
    <rect x="52" y="68" width="5" height="12" rx="2.5" fill="#F7F7EF" opacity="0.82"/>
    <rect x="61" y="61" width="5" height="19" rx="2.5" fill="#F7F7EF" opacity="0.9"/>
    <rect x="70" y="53" width="5" height="27" rx="2.5" fill="#A8FF3E" opacity="0.95"/>

    <!-- subtle growth line, not too obvious -->
    <path d="M49 82C58 90 75 90 84 78" stroke="#A8FF3E" stroke-width="2.4" stroke-linecap="round" opacity="0.58"/>

    <!-- premium highlight -->
    <ellipse cx="78" cy="29" rx="25" ry="15" fill="url(#klmShine)"/>
  </g>

  <!-- Wordmark -->
  <text
    x="154"
    y="81"
    font-family="Manrope, Inter, Arial, sans-serif"
    font-size="47"
    letter-spacing="-1.45"
  >
    <tspan fill="#F7F7EF" font-weight="850">KLM</tspan>
    <tspan dx="8" fill="#DCE4D8" font-weight="650">Group</tspan>
  </text>
</svg>